<html>
<head>
<title>College Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

/* animated gradient background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(-45deg,#1a2a6c,#b21f1f,#fdbb2d,#0f2027);
background-size:400% 400%;

animation:gradientMove 12s ease infinite;
}

/* animation */

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* main container */

.container{
text-align:center;
padding:50px 70px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);

animation:fadeIn 1.5s ease;
}

/* heading */

h1{
color:white;
margin-bottom:40px;
font-size:40px;
letter-spacing:1px;
}

/* buttons */

.btn{
display:block;
width:220px;
margin:15px auto;
padding:15px;

background:white;
color:#333;

border-radius:8px;
font-size:18px;
font-weight:bold;

cursor:pointer;
transition:0.3s;
}

/* hover effect */

.btn:hover{
transform:translateY(-5px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
background:#00c6ff;
color:white;
}

/* fade animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome to SRKR College Management</h1>

<div class="btn" onclick="checking('user_login')">User Login</div>
<div class="btn" onclick="checking('student_login')">Student Login</div>

</div>
<script>
    function checking(page){
        if(page=='user_login'){
            window.location.href="admin_login.html";
        }
        else{
            window.location.href="student_login.html"
        }
    }
</script>
</body>
</html>
