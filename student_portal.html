<!DOCTYPE html>
<html>
<head>
<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:40px;
}

/* Title */

h1{
   text-align:center;
   color:white;
   margin-bottom:40px;
   letter-spacing:2px;
}

/* Grid container */

.container{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
gap:25px;
max-width:900px;
margin:auto;
}

/* Card blocks */

.but{
background:linear-gradient(45deg,#ff416c,#ff4b2b);
padding:40px;
text-align:center;
color:white;
font-weight:bold;
border-radius:15px;
font-size:18px;
cursor:pointer;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
transition:0.4s;
}

/* Hover Effects */

.but:hover{

transform:translateY(-10px) scale(1.05);

box-shadow:0 20px 40px rgba(0,0,0,0.4);

filter:brightness(120%);
}


</style>
</head>

<body>

<h1>Welcome Student Portal</h1>

<div class="container">

<div class="but">Skills Improving</div>
<div class="but">Do the Projects</div>
<div class="but">Participating in Events</div>
<div class="but">New Project Launch</div>
<div class="but">Check Your Marks</div>
<div class="but">Check Your Attendance</div>

</div>

</body>
</html>
