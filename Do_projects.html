<html>
  <head>
    <title>Do the Project</title>
    <style>
      .project-box {
        border: 1px solid #333;
        padding: 15px;
        margin: 10px;
        border-radius: 8px;
        background-color: #f5f5f5;
      }
      .project-box h2 {
        margin: 0;
      }
      .project-box textarea {
        width: 100%;
        height: 60px;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <h1>Project for Student</h1>
    <div id="projects"></div>

    <script>
      // Read the URL parameters
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name");
      const field = params.get("field");
      const desc = params.get("desc"); // optional

      const container = document.getElementById("projects");

      // Create project box dynamically
      const box = document.createElement("div");
      box.classList.add("project-box");

      // Add project title
      const title = document.createElement("h2");
      title.textContent = name;
      box.appendChild(title);

      // Add field info
      const fieldP = document.createElement("p");
      fieldP.textContent = "Field: " + field;
      box.appendChild(fieldP);

      // Add description if available
      if(desc) {
        const descP = document.createElement("p");
        descP.textContent = "Description: " + desc;
        box.appendChild(descP);
      }

      // Add textarea for student notes
      const ta = document.createElement("textarea");
      ta.placeholder = "Write your progress or notes here...";
      box.appendChild(ta);

      // Add checkbox to mark as done
      const doneLabel = document.createElement("label");
      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      doneLabel.appendChild(checkbox);
      doneLabel.appendChild(document.createTextNode(" Completed"));
      box.appendChild(doneLabel);

      // Append the box to the container
      container.appendChild(box);
    </script>
  </body>
</html>
